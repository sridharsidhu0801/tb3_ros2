velocity_smoother:
  ros__parameters:
    smoothing_frequency: 20.0
    scale_velocities: false
    feedback: "OPEN_LOOP"

    max_velocity: [0.22, 0.0, 2.84]
    min_velocity: [-0.22, 0.0, -2.84]

    max_accel: [0.5, 0.0, 2.0]
    max_decel: [-0.5, 0.0, -2.0]

    odom_topic: "/tb1/odom"
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 0.5
